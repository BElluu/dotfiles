# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Terminal & colors ─────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── General settings ──────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g mouse on
set -sg escape-time 0
set -g focus-events on

# ── Splits ────────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── vim-tmux-navigator ────────────────────────────────────────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ── Vi copy mode ──────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# ── Status bar — TOP only ─────────────────────────────────────────────────────
set -g status on
set -g status-position top
set -g status-interval 2
set -g status-justify centre
set -g status-style "bg=#1e1e2e"

# Sessions list (left) — rendered by sessions.sh
set -g status-left-length 200
set -g status-left "#(~/.config/tmux/sessions.sh)"

# Windows (centre)
setw -g window-status-format         "#[fg=#585b70,bg=#1e1e2e]  #I:#W  "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold]  #I:#W  #[fg=#cba6f7,bg=#1e1e2e,nobold]"
setw -g window-status-separator      ""

# Time (right)
set -g status-right-length 60
set -g status-right "#[fg=#585b70,bg=#1e1e2e] %H:%M  %d.%m.%Y "

# ── Pane borders (Catppuccin Mocha) ───────────────────────────────────────────
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ── Messages ──────────────────────────────────────────────────────────────────
set -g message-style "fg=#cdd6f4,bg=#313244"

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── TPM plugins ───────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# ── Initialize TPM (must be last line) ────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
